<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORSTAC - Open Source Robots & Technical Analyses</title>
    <style>
        :root {
            --primary: #ff4444;
            --dark: #0e1117;
            --text: #ffffff;
            --gray: #8b949e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: var(--gray);
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 2rem;
        }
        .cta-container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-secondary {
            background-color: transparent;
            border: 2px solid var(--gray);
            color: var(--text);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--gray);
        }
    </style>
</head>
<body>
    <h1>ORSTAC</h1>
    <p>Empowering Traders with the World's Largest Collection of Open-Source Deriv Trading Bots.</p>
    
    <div class="cta-container">
        <a href="https://track.deriv.com/_h1BT0UryldiFfUyb_9NCN2Nd7ZgqdRLk/1/" class="btn btn-primary">Register on Deriv</a>
        <a href="https://bingxdao.com/invite/TLU7DW/" class="btn btn-primary">Join BingX AI</a>
        <a href="docs/ROBOTS_INDEX.md" class="btn btn-secondary">Browse 4000+ Bots</a>
    </div>

    <div class="footer">
        © 2025 ORSTAC Community. All rights reserved.
    </div>
</body>
</html>
